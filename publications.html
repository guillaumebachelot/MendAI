  <style>
    /* ---- Publications page overrides ---- */
    :root {
      --pub-bg:           var(--mid);
      --pub-surface:      var(--white);
      --pub-ink:          var(--text);
      --pub-muted:        var(--text-muted);
      --pub-accent:       var(--orange);
      --pub-blue:         var(--teal);
      --pub-border:       var(--border);
      --pub-accent-light: rgba(37,99,235,.08);
      --pub-blue-light:   rgba(29,78,216,.1);
    }

    .pub-page-body { font-family: var(--font); background: var(--mid); }

    .pub-content { padding: 120px 4rem 5rem; max-width: 920px; margin: 0 auto; }

    .pub-content h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.3rem;
      color: var(--text);
    }

    .pub-subtitle { color: var(--pub-muted); font-size: 0.9rem; margin-bottom: 3rem; }
    .pub-subtitle strong { color: var(--pub-ink); }

    .pub-section-block { margin-top: 3rem; }

    .pub-section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pub-accent);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .pub-section-label::after { content: ''; flex: 1; height: 1px; background: var(--pub-border); }

    .pub-list-new { display: flex; flex-direction: column; gap: 0.85rem; }

    .pub-card-new {
      background: var(--pub-surface);
      border: 1px solid var(--pub-border);
      border-radius: 5px;
      padding: 1.25rem 1.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .pub-card-new:hover { border-color: var(--pub-accent); box-shadow: 0 4px 20px rgba(37,99,235,0.1); }

    .pub-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.4rem; }

    .pub-journal-tag {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pub-blue);
      background: var(--pub-blue-light);
      padding: 0.18rem 0.55rem;
      border-radius: 100px;
      white-space: nowrap;
    }
    .pub-journal-tag.orange { color: var(--pub-accent); background: var(--pub-accent-light); }

    .pub-year-tag { font-size: 0.68rem; font-weight: 500; color: var(--pub-muted); white-space: nowrap; padding-top: 0.1rem; }

    .pub-title-new { font-size: 0.95rem; font-weight: 500; line-height: 1.5; margin-bottom: 0.5rem; color: var(--pub-ink); }

    .pub-authors-new { font-size: 0.82rem; color: var(--pub-muted); line-height: 1.65; }
    .pub-authors-new b { color: var(--pub-ink); font-weight: 600; }

    .pub-meta-new { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem; flex-wrap: wrap; }

    .pub-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--pub-bg);
      border: 1px solid var(--pub-border);
      border-radius: 100px;
      padding: 0.18rem 0.55rem;
      color: var(--pub-muted);
    }
    .pub-badge.oa  { color: #2a7a4f; border-color: #c4e0d0; background: #f0f8f4; }
    .pub-badge.pre { color: #7a4a2a; border-color: #e0d0c4; background: #fdf5f0; }

    .pub-link-new {
      font-size: 0.75rem;
      color: var(--pub-accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: opacity 0.2s;
    }
    .pub-link-new:hover { opacity: 0.7; text-decoration: underline; }

    em.note { font-size: 0.78rem; color: var(--pub-muted); font-style: italic; }

    @media (max-width: 600px) { .pub-content { padding: 110px 1.25rem 3rem; } }
  </style>
</head>
